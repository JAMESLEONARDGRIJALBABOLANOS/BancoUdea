```properties
# sonar-project.properties
sonar.projectKey=jamesgrib_BancoUdea
sonar.organization=jamesgrib

# Fuentes Java (Maven las detecta automáticamente via plugin)
sonar.java.source=17

# Fuentes Python
sonar.python.version=3
sonar.sources=src/main/java,scripts
sonar.tests=src/test

# Cobertura Java (generada por JaCoCo - ver nota 02)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusiones
sonar.exclusions=**/*Test*.java,**/*IT*.java,**/target/**,**/*.feature
sonar.coverage.exclusions=**/*Application.java,**/*Config*.java
```
