name: SonarCloud Analysis

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Unit tests + JaCoCo report + Sonar en una sola sesión Maven.
      # -DskipITs evita que Spring Boot arranque y que Karate corra
      # (los tests Karate son HTTP black-box y nunca generan cobertura real).
      - name: Build, Unit Tests & SonarCloud Analysis
        run: >
          ./mvnw clean test
          org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar
          -DskipITs
          -Dspring.profiles.active=test
        env:
          MAVEN_OPTS: "-Xmx2g"
          SPRING_PROFILES_ACTIVE: test
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # Integration tests como paso separado (informativo, no bloquea el CI)
      # -DskipTests omite surefire pero failsafe (Karate) sí corre
      - name: Integration Tests (Karate)
        run: ./mvnw verify -DskipTests -Dspring.profiles.active=test
        continue-on-error: true
        env:
          MAVEN_OPTS: "-Xmx2g"
          SPRING_PROFILES_ACTIVE: test
