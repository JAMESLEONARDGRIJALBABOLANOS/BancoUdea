name: SonarCloud Analysis

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Compila, ejecuta unit tests y genera el reporte JaCoCo.
      # -DskipITs omite Spring Boot + Karate (no aportan cobertura real).
      - name: Build & Unit Tests
        run: ./mvnw clean test -DskipITs -Dspring.profiles.active=test
        env:
          MAVEN_OPTS: "-Xmx2g"
          SPRING_PROFILES_ACTIVE: test

      # Análisis con la GitHub Action oficial de SonarCloud.
      # Lee la configuración desde sonar-project.properties.
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Integration tests (Karate) — informativo, no bloquea el CI
      - name: Integration Tests (Karate)
        run: ./mvnw verify -DskipTests -Dspring.profiles.active=test
        continue-on-error: true
        env:
          MAVEN_OPTS: "-Xmx2g"
          SPRING_PROFILES_ACTIVE: test
